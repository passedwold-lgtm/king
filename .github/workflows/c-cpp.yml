name: Build Theos Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Theos
      run: |
        # ติดตั้ง Theos
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "~/theos/bin" >> $GITHUB_PATH

    - name: Build Tweak
      run: |
        export THEOS=~/theos
        # ใช้ SDK ที่มากับ Xcode ในเครื่อง (macos-latest จะมี Xcode ล่าสุดอยู่แล้ว)
        # วิธีนี้จะช่วยแก้ปัญหา module 'std_float_h' และ 'CoreFoundation' build ไม่ผ่าน
        make clean && make FINALPACKAGE=1 SDKVERSION=18.4
      env:
        # บังคับให้ใช้ SDK จาก Xcode
        SYSROOT: $(xcrun --sdk iphoneos --show-sdk-path)

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Tweak-Dylib
        path: |
          .theos/obj/arm64/*.dylib
          packages/*.deb
