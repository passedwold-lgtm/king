name: Build Theos Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Theos
      run: |
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "~/theos/bin" >> $GITHUB_PATH

    - name: Set up iOS SDK
      run: |
        git clone --depth 1 https://github.com/xybp888/iOS-SDKs.git ~/theos/sdks
        mv ~/theos/sdks/*.sdk ~/theos/sdks/ 2>/dev/null || true

    - name: Build Tweak
      run: |
        export THEOS=~/theos
        make clean && make FINALPACKAGE=1

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Tweak-Dylib
        path: |
          .theos/obj/arm64/*.dylib
          packages/*.deb
